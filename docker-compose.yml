version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: p2p_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: ethiopian_p2p
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: p2p_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:securepassword123@postgres:5432/ethiopian_p2p?schema=public
      - NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key
      - SUPABASE_SERVICE_ROLE_KEY=your-service-role-key
      - SUMSUB_API_TOKEN=your-sumsub-token
      - SUMSUB_SECRET_KEY=your-sumsub-secret
      - TATUM_API_KEY=your-tatum-api-key
      - TATUM_WEBHOOK_SECRET=your-webhook-secret
      - ADMIN_EMAILS=admin@ethiopianp2p.com,admin@p2p.com
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
